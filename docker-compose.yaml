version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__API__AUTH_BACKENDS: ${AIRFLOW__API__AUTH_BACKENDS}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW_CONN_OPEN_SIGNAL_POSTGRES: ${AIRFLOW_CONN_OPEN_SIGNAL_POSTGRES}
    POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
    POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
    POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    PG_HOST: ${PG_HOST}
    PG_PORT: ${PG_PORT}
    PG_DB: ${PG_DB}
    PG_USER: ${PG_USER}
    PG_PASSWORD: ${PG_PASSWORD}
    PG_SCHEMA: ${PG_SCHEMA}
    OPEN_SIGNAL_DATA_PATH: ${OPEN_SIGNAL_DATA_PATH}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - default
    - service-metrics-pipeline-network

services:
  metrics_postgres:
    image: postgres:15
    ports:
      - "5435:5432"
    networks:
      - service-metrics-pipeline-network
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 5
  extract_load_open_signal:
    build:
      context: ./elt/open_signal
      dockerfile: Dockerfile
    command: ["python", "extract_load.py"]
    volumes:
      - ./data:/data
    env_file:
      - .env
    networks:
      - service-metrics-pipeline-network
    depends_on:
      metrics_postgres:
        condition: service_healthy
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.4.7
    command: ["run", "--profiles-dir", "/root", "--project-dir", "/dbt"]
    networks:
      - service-metrics-pipeline-network
    volumes:
      - ./service_metrics_dbt:/dbt
      - ~/.dbt:/root
    depends_on:
      extract_load_open_signal:
        condition: service_completed_successfully 
    env_file:
      - .env
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    environment:
      <<: *airflow-common-env

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./elt:/opt/airflow/elt
      - ./service_metrics_dbt:/opt/dbt
      - ~/.dbt:/home/airflow/.dbt
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./elt:/opt/airflow/elt
      - ./service_metrics_dbt:/opt/dbt
      - ~/.dbt:/home/airflow/.dbt
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    restart: unless-stopped
    environment:
      <<: *airflow-common-env
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    extra_hosts:
      - "host.docker.internal:host-gateway"
  
  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    networks:
      - service-metrics-pipeline-network
    depends_on:
      - metrics_postgres

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    env_file:
      - .env
    volumes:
      - kafka_kraft:/var/lib/kafka/data
    networks:
      - service-metrics-pipeline-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  speed_test_producer:
    build: ./kafka
    command: ["uvicorn", "speed_test.producer:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - service-metrics-pipeline-network
    depends_on:
      kafka:
        condition: service_healthy

  speed_test_consumer:
    build: ./kafka
    command: ["python", "-m", "speed_test.consumer"]
    env_file:
      - .env
    networks:
      - service-metrics-pipeline-network
    depends_on:
      metrics_postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

networks:
  service-metrics-pipeline-network:
    driver: bridge

volumes:
  postgres-db-volume:
  kafka_kraft:
